services:
  argent-bot-service:
    build: .
    container_name: argent-bot-service
    ports:
      - "8002:8000"
    restart: always
    environment:
      - PYTHONPATH=/app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - argent-shared-network

networks:
  argent-shared-network:
    external: true